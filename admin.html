<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reserva de Mesas</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <!-- Navbar -->

  <nav class="navbar navbar-dark bg-dark">

    <div class="container">

      <div class="d-flex justify-content-between w-100 align-items-center">

        <span class="navbar-brand mb-0 h1">
          Restaurante Comeu, Morreu - Reserva
        </span>
        
        <button
          class="btn btn-danger"
          onclick="limparReservas()"
        >
          Limpar Reservas
        </button>

      </div>

    </div>

  </nav>

  <!-- Conteúdo -->

  <div class="container mt-5">

    <div class="card shadow agenda-card">

      <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-4">

          <h3>
            Agenda de Reservas
          </h3>

          <input
            type="date"
            id="data"
            class="form-control w-auto"
          >

        </div>

        <div class="table-responsive">

          <table class="table table-bordered agenda-table">

            <thead>

              <tr>

                <th>Horário</th>
                <th>Mesa 1</th>
                <th>Mesa 2</th>
                <th>Mesa 3</th>
                <th>Mesa 4</th>

              </tr>

            </thead>

            <tbody id="agendaBody">

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

  <!-- Modal Reserva -->

  <div
    class="modal fade"
    id="modalReserva"
    tabindex="-1"
  >

    <div class="modal-dialog">

      <div class="modal-content">

        <div class="modal-header">

          <h5 class="modal-title">
            Nova Reserva
          </h5>

          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
          ></button>

        </div>

        <div class="modal-body">

          <form id="formReserva">

            <div class="mb-3">

              <label class="form-label">
                Nome
              </label>

              <input
                type="text"
                class="form-control"
                id="nome"
                required
              >

            </div>

            <div class="mb-3">

              <label class="form-label">
                Telefone
              </label>

              <input
                type="text"
                class="form-control"
                id="telefone"
                required
              >

            </div>

            <div class="mb-3">

              <label class="form-label">
                Pessoas
              </label>

              <input
                type="number"
                class="form-control"
                id="pessoas"
                required
              >

            </div>

            <input type="hidden" id="mesaSelecionada">
            <input type="hidden" id="horarioSelecionado">

            <button
              type="submit"
              class="btn btn-dark w-100"
            >
              Confirmar Reserva
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

  <!-- Conteúdo -->

  <div class="container mt-5">

    <div class="card shadow agenda-card">

      <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-4">

          <h3>
            Reservas
          </h3>

        </div>

        <div class="table-responsive">

          <table class="table table-hover align-middle">

            <thead class="table-dark">

              <tr>

                <th>Cliente</th>
                <th>Mesa</th>
                <th>Horário</th>
                <th>Pessoas</th>
                <th>Status</th>
                <th>Ações</th>

              </tr>

            </thead>

            <tbody id="listaReservas">

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

  <!--Lista de Espera-->
  
  <div class="container mt-4">

  <div class="card shadow agenda-card">

    <div class="card-body">

      <h3 class="mb-4">
        Lista de Espera
      </h3>

      <div class="table-responsive">

        <table class="table table-hover align-middle">

          <thead class="table-dark">

            <tr>
              <th>Cliente</th>
              <th>Pessoas</th>
              <th>Horário Desejado</th>
              <th>Status</th>
            </tr>

          </thead>

          <tbody id="listaEspera"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="js/reservas.js"></script>
  <script src="js/garcom.js"></script>
  <script src="js/cliente.js"></script>

</body>

</html>
